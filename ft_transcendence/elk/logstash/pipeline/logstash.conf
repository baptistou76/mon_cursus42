input {
  beats { port => 5044 }
}

filter {
  json { source => "message" }

  date { match => ["@timestamp", "ISO8601"] target => "@timestamp" }
}

output {
  elasticsearch {
    hosts => ["https://elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
    user => "logstash_internal"
    password => "${LOGSTASH_PASSWORD}"
    cacert => "/usr/share/logstash/config/certs/ca/ca.crt"
    ssl => true
  }

  file {
    path => "/archives/logs-%{+YYYY.MM.dd}.json.gz"
    gzip => true
    codec => json_lines
  }
}

docker compose exec -T elk-setup curl -fsS --cacert /certs/ca/ca.crt -u "elastic:$ELASTIC_PASSWORD" https://elasticsearch:9200
docker compose exec -T elk-setup curl -fsS --cacert /certs/ca/ca.crt -u "elastic:$ELASTIC_PASSWORD" \
  "https://elasticsearch:9200/_cat/indices/logs-*?v"
docker compose exec -T logstash sh -lc 'ls -lah /archives | tail -n 20'
